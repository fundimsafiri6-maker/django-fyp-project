<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f1f5f9;
}

/* Sidebar */
.sidebar{
    width:220px;
    height:100vh;
    background:#0f172a;
    position:fixed;
    left:0;
    top:0;
    padding-top:20px;
}

.sidebar h2{
    color:white;
    text-align:center;
    margin-bottom:30px;
}

.sidebar a{
    display:block;
    color:white;
    padding:15px;
    text-decoration:none;
}

.sidebar a:hover{
    background:#2563eb;
}

/* Main content */
.main{
    margin-left:220px;
    padding:30px;
}

.header{
    background:white;
    padding:15px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
    margin-top:30px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    text-align:center;
}
</style>

</head>
<body>

<div class="sidebar">
    <h2>Admin Panel</h2>
    <a href="/admin-dashboard/">Dashboard</a>
    <a href="/assign-complaints/">Assign Complaints</a>
    <a href="/complaints-stats/">Statistics</a>
    <a href="/accounts/login/">Logout</a>
</div>

<div class="main">
    <div class="header">
        <h3>Welcome Admin</h3>
    </div>

    <div class="cards">
        <div class="card">
            <h4>Total Complaints</h4>
            <p>120</p>
        </div>
        <div class="card">
            <h4>Pending</h4>
            <p>90</p>
        </div>
        <div class="card">
            <h4>Resolved</h4>
            <p>70</p>
        </div>
    </div>
</div>

</body>
</html>
